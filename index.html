<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kindred</title>
    <style>
      /* Reset the browser's default body margin (8px) and guard against
         horizontal overflow site-wide. Without this, the default white
         page background shows through along the edges on every screen —
         most visible on mobile as a persistent vertical strip, since 8px
         is a much larger share of a narrow viewport. Not scroll-related
         and unaffected by "Request Desktop Site" because it's a CSS
         box-model issue at the document root, not a mobile-browser
         rendering quirk. */
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
      }
      #root {
        width: 100%;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
